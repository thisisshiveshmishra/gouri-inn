<!DOCTYPE html>
<html>
<head>
<title>Gouri Inn</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:35px 25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
width:90%;
max-width:380px;
text-align:center;
}

h2{
margin-bottom:30px;
color:#333;
font-weight:500;
}

button{
display:block;
width:100%;
margin:15px 0;
padding:15px;
font-size:16px;
border-radius:8px;
cursor:pointer;
border:1px solid #ddd;
background:white;
color:#333;
transition:0.2s;
}

button:hover{
background:#333;
color:white;
border-color:#333;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h2>Welcome to Gouri Inn</h2>

<button onclick="window.location.href='https://sites.google.com/view/hotel-gouri-inn-menu'">
🍽 View Menu
</button>

<button onclick="window.location.href='https://search.google.com/local/writereview?placeid=ChIJtajM3gyj1jsRLErZpOutuoY'">
⭐ Leave Google Review
</button>

<button onclick="window.location.href='instagram://user?username=gouriinn'">
📸 Follow Instagram
</button>

<div class="footer">
Thank you for visiting
</div>

</div>

</body>
</html>
