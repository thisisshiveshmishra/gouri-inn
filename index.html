<!DOCTYPE html>
<html>
<head>
<title>Gouri Inn</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family: 'Segoe UI', Arial, sans-serif;
background: linear-gradient(135deg,#f8f8f8,#e9ecef);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px 25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:90%;
max-width:380px;
text-align:center;
}

h2{
margin-bottom:25px;
color:#333;
}

button{
display:block;
width:100%;
margin:15px 0;
padding:16px;
font-size:17px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.25s;
font-weight:600;
}

button:hover{
transform:scale(1.03);
}

.menu{
background:#ff9800;
color:white;
}

.review{
background:#28a745;
color:white;
}

.instagram{
background:#E1306C;
color:white;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h2>🍽 Welcome to Gouri Inn</h2>

<button class="menu"
onclick="window.location.href='https://sites.google.com/view/hotel-gouri-inn-menu'">
📋 View Menu
</button>

<button class="review"
onclick="window.location.href='https://search.google.com/local/writereview?placeid=ChIJtajM3gyj1jsRLErZpOutuoY'">
⭐ Leave a Google Review
</button>

<button class="instagram"
onclick="window.location.href='instagram://user?username=gouriinn'">
📸 Follow us on Instagram
</button>

<div class="footer">
Thank you for visiting ❤️
</div>

</div>

</body>
</html>
